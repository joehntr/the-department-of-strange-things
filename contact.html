<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Department of Strange Things - Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo-icon">
                <img src="images/logo.png" alt="The Department of Strange Things" style="width: 120px; height: 72px;">
            </div>
        </div>

        <nav>
            <a href="index.html">Work</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>

        <form class="contact-form" id="contactForm">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>

        <div class="instagram-link">
            <a href="https://instagram.com/yourusername" target="_blank">
                📸 Follow on Instagram
            </a>
        </div>

        <footer>
            <p>© 2026 The Department of Strange Things</p>
        </footer>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Thanks for your message! (This is a demo - add your own form handling)');
            this.reset();
        });
    </script>
</body>
</html>
